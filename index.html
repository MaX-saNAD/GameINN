<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameINN</title>

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />

    <!-- Link the stylesheet -->
    <link rel="stylesheet" href="assets/style/style.css" />
  </head>
  <body>
    <section class="hero">
      <nav>
        <div class="container">
          <div class="flex-wrapper">
            <div class="left">
              <div class="brand">
                <img
                  src="assets/images/logo.svg"
                  alt="GameINN logo"
                  width="65"
                  height="70"
                />
              </div>
              <ul class="links">
                <li class="link"><a href="#features">features</a></li>
                <li class="link"><a href="#gallery">gallery</a></li>
                <li class="link"><a href="#about">about</a></li>
                <li class="link"><a href="#locations">locations</a></li>
              </ul>
            </div>
            <div class="right">
              <button class="btn secondary-btn">Book Now</button>
            </div>
          </div>
        </div>
      </nav>
      <div class="hero-content">
        <div class="h1-wrapper">
          <img src="assets/images/Popup.svg" alt="" class="badge" />
          <h1>Port Said's Living Room</h1>
        </div>
        <h3>Show up once. Feel like you belong.</h3>
        <p class="subheader">
          PS5 Rooms · Sports Screenings · Café Corner · Live Sports TV
        </p>
        <div class="CTAs">
          <button class="btn primary-btn">Book Now</button>
          <button class="btn secondary-btn">Explore Rooms</button>
        </div>
        <!-- <div class="pop-up">
          <img src="assets/images/Popup.svg" alt="pop-up" />
        </div> -->
      </div>
    </section>
    <section class="features" id="features">
      <div class="container">
        <div class="heading-content">
          <h2>Pick your game Pick your night</h2>
          <p class="subheader">
            The ultimate destination for gamers, sports fans, and friends
            looking for a great night out.
          </p>
        </div>

        <div class="cards">
          <div class="card">
            <img src="" alt="" />
            <h3></h3>
            <p class="caption"></p>
          </div>
          <div class="card">
            <img src="" alt="" />
            <h3></h3>
            <p class="caption"></p>
          </div>
          <div class="card">
            <img src="" alt="" />
            <h3></h3>
            <p class="caption"></p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
